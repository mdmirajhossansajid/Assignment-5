<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

<!-- daisyUI tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- css -->
    <link rel="stylesheet" href="index.css">
</head>
<body class="bg-base-200 min-h-screen flex items-center justify-center geist">

    <div class="bg-white p-8 rounded-2xl shadow-lg w-96">

        <!-- Logo + Title -->
        <div class="text-center mb-6">
            <img src="assets/github-logo.png" class="w-16 mx-auto mb-3" />
            <h1 class="text-xl font-semibold">GitHub Issues Tracker</h1>
            <p class="text-sm text-gray-500">Sign in to manage your issues</p>
        </div>

        <!-- Form -->
        <div>
            <label class="label">Username</label>
            <input type="text" class="input input-bordered w-full mb-3" placeholder="Enter Username">

            <label class="label">Password</label>
            <input type="password" class="input input-bordered w-full mb-4" placeholder="Enter Password">

            <!-- Gradient Button -->
            <button class="w-full py-2 rounded-lg text-white font-medium 
            btn btn-primary ">
                Sign In
            </button>
        </div>

        <!-- OR Divider -->
        <div class="flex items-center my-6">
            <hr class="flex-grow border-gray-300">
            <span class="mx-2 text-gray-400 text-sm">OR</span>
            <hr class="flex-grow border-gray-300">
        </div>

        <!-- Demo Credentials -->
        <div class="bg-gray-100 p-4 rounded-lg text-center text-sm">
            <p class="text-gray-500 mb-1">Demo Credentials:</p>
            <p><strong>Username:</strong> admin</p>
            <p><strong>Password:</strong> admin123</p>
        </div>

    </div>

    <script src="index.js"></script>
</body>
</html>
