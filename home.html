<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <!-- daisyUI tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- css -->
    <link rel="stylesheet" href="index.css">
</head>
<body class="geist">
    <section>
        <div class="navbar bg-base-100 shadow-sm">
            <div class="flex-1">
               <div class="flex items-center gap-2 ml-8">
                <img src="assets/github-logo.png" alt="" class="w-8">
                <p>GitHub Issues Tracker</p>
               </div>
            </div>
            <div class="flex gap-2">
                <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
                
                    <div  class="mr-8" >
                        <button id="new-issue-btn" class="w-full py-2 rounded-lg text-white font-medium btn btn-primary ">
                        <i class="fa-solid fa-plus"></i> New Issue
                        </button>
                </div>
            </div>
        </div>
    </section>
    <section class="p-8 mx-auto w-10/12 ">
        <div class="flex gap-3  mb-6 bg-base-100 mt-6 rounded-lg shadow-sm p-3">
            <button id="all-btn" class="btn btn-ghost  font-semibold">All</button>
            <button id="open-btn" class="btn btn-ghost font-semibold">Open</button>
            <button id="closed-btn" class="btn btn-ghost  font-semibold">Closed</button>
        </div>
        <div class="bg-base-100 p-5 rounded-lg shadow-sm flex items-center justify-between mb-6">
        
            <!-- Left Side -->
            <div class="flex items-center gap-3">
                
                <div class="w-10 h-10 flex items-center justify-center bg-purple-100 text-purple-600 rounded-full">
                   <img src="assets/Aperture.png" alt="">
                </div>
        
                <!-- Text -->
                <div>
                    <h2 id="issue-count" class="font-semibold text-lg">0 Issues</h2>
                    <p class="text-sm text-gray-500">Track and manage your project issues</p>
                </div>
            </div>
        
            <!-- Right Side -->
            <div class="flex items-center gap-4 text-sm">
        
                <div class="flex items-center gap-1">
                    <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                    <span>Open</span>
                </div>
        
                <div class="flex items-center gap-1">
                    <span class="w-2 h-2 bg-purple-500 rounded-full"></span>
                    <span>Closed</span>
                </div>
        
            </div>
        
        </div>
            <div id="issues-container" class="grid gap-4  grid-cols-1 md:grid-cols-2 lg:grid-cols-4 items-stretch">
                <!-- Issues will be dynamically added here -->
                



            </div>
    </section>
    <dialog id="issueModal" class="modal">
        <div class="modal-box max-w-2xl">
    
            <div class="p-5 rounded-lg space-y-4">
    
                <!-- Title -->
                <h2 id="modal-title" class="text-xl font-bold">
                    Fix broken image uploads
                </h2>
    
                <!-- Status + Info -->
                <div class="flex items-center gap-2 text-sm text-gray-500">
                    <span id="modal-status" class="bg-green-500 text-white px-2 py-1 rounded-full text-xs">Opened</span>
                    <span>• Opened by <span id="modal-author">Fahim Ahmed</span></span>
                    <span>• <span id="modal-date">22/02/2026</span></span>
                </div>
    
                <!-- Labels -->
                <div id="modal-labels" class="flex gap-2 flex-wrap">
                    <!-- dynamic labels -->
                </div>
    
                <!-- Description -->
                <p id="modal-description" class="text-gray-600">
                    The navigation menu doesn't collapse properly...
                </p>
    
                <!-- Bottom -->
                <div class="flex justify-between items-center mt-6">
    
                    <div>
                        <p class="text-sm text-gray-500">Assignee:</p>
                        <p id="modal-assignee" class="font-semibold">Fahim Ahmed</p>
                    </div>
    
                    <div>
                        <p class="text-sm text-gray-500">Priority:</p>
                        <span id="modal-priority" class="bg-red-500 text-white px-3 py-1 rounded-xl text-sm">HIGH</span>
                    </div>
    
                </div>
    
            </div>
    
            <!-- Close Button -->
            <div class="modal-action">
                <form method="dialog">
                    <button class="btn btn-primary">Close</button>
                </form>
            </div>
    
        </div>
    </dialog>
    <script src="home.js"></script>
</body>
</html>
